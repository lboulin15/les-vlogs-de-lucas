<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Les Vlogs de Lucas — Connexion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- DIAPORAMA FOND -->
  <div class="login-slideshow" id="loginSlideshow">
    <div class="login-slide active" id="slide0"></div>
    <div class="login-slide" id="slide1"></div>
    <div class="login-slide" id="slide2"></div>
    <div class="login-slide" id="slide3"></div>
    <div class="login-slide" id="slide4"></div>
  </div>
  <div class="login-slideshow-overlay"></div>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">LES VLOGS<br><span>DE LUCAS</span></div>
      <p class="login-subtitle">Plateforme privée — Connexion requise</p>

      <form class="login-form" id="loginForm" autocomplete="off">

        <div class="form-group">
          <label class="form-label" for="email">Adresse email</label>
          <input
            class="form-input"
            type="email"
            id="email"
            placeholder="votre@email.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <div class="input-password-wrap">
            <input
              class="form-input"
              type="password"
              id="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Afficher le mot de passe">
              <!-- Oeil fermé (mot de passe masqué) -->
              <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
              </svg>
              <!-- Oeil ouvert (mot de passe visible) -->
              <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="login-error" id="loginError"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
          Se connecter
        </button>

      </form>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
