<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture — Les Vlogs de Lucas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="netflix video-page-body">

  <!-- LOADING -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo">LUCAS</div>
    <div class="spinner"></div>
  </div>

  <!-- PAGE VIDEO -->
  <main class="video-layout" id="videoPage" style="display:none;">

    <!-- ACTIONS TOP -->
    <div class="video-top-actions">
      <button class="video-top-btn" id="backBtn">← Retour</button>
      <button class="video-top-btn" id="logoutBtn">Déconnexion</button>
    </div>

    <!-- BLOC PRINCIPAL -->
   <section class="video-main-block">

  <div class="video-hero-card">
    <!-- PLAYER -->
    <div class="video-player-shell">
      <div class="video-player-main" id="playerWrap"></div>
    </div>

    <!-- INFOS -->
    <div class="video-hero-content">
      <div class="video-title-block">
        <div class="video-kicker">LES VLOGS DE LUCAS</div>
        <h1 class="video-title-main" id="videoTitle">Titre vidéo</h1>
        <div class="video-meta-main">
          <span class="video-date-main" id="videoDate"></span>
          <span class="video-meta-separator">•</span>
          <span class="video-category-main">Vlog</span>
        </div>
      </div>

      <!-- DESCRIPTION -->
      <div class="video-description-card">
        <div class="video-description-main" id="videoDescription">
          Description de la vidéo
        </div>
      </div>

      <!-- NOTES -->
      <div class="video-rating-block">
        <div class="rating-label-main">Votre note</div>

        <div class="stars" id="starRating">
          <span data-value="1">★</span>
          <span data-value="2">★</span>
          <span data-value="3">★</span>
          <span data-value="4">★</span>
          <span data-value="5">★</span>
        </div>

        <div id="ratingAverage" class="rating-average-main"></div>
      </div>
    </div>
  </div>

</section>

    <!-- SUGGESTIONS -->
    <section class="suggestions-block row-section" id="suggestedSection" style="display:none;">
      <h2 class="row-title">À regarder ensuite</h2>

      <div class="row-slider">
        <button class="row-btn left" id="prevBtn">‹</button>

        <div class="row-window">
          <div class="row-track" id="suggestedTrack"></div>
        </div>

        <button class="row-btn right" id="nextBtn">›</button>
      </div>
    </section>

    <!-- COMMENTAIRES -->
    <section class="comments-block comments-section">
      <h2 class="row-title">Commentaires</h2>

      <div class="comment-form">
        <textarea
          id="commentInput"
          class="comment-input"
          placeholder="Écrire un commentaire..."
          maxlength="1000"
        ></textarea>

        <button id="commentSubmit" class="btn btn-primary">
          Publier
        </button>
      </div>

      <div class="comment-list" id="commentList">
        <p class="comment-empty">Chargement des commentaires...</p>
      </div>
    </section>

  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script type="module" src="video.js"></script>
</body>
</html>
