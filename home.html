<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Les Vlogs de Lucas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-transition" id="pageTransition"></div>

  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo">LUCAS</div>
    <div class="spinner"></div>
  </div>

  <nav class="navbar" id="navbar" style="display:none">
    <div class="navbar-brand" id="navBrand">
      <div class="navbar-pulse"></div>
      LES VLOGS <span>&nbsp;DE LUCAS</span>
    </div>
    <div class="navbar-right">
      <span class="navbar-user" id="navUserEmail"></span>
      <a href="admin.html" class="btn btn-secondary btn-sm" id="adminLink" style="display:none">
        👑 Panel Admin
      </a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Déconnexion</button>
    </div>
  </nav>

  <div class="home-page" id="homePage" style="display:none">

    <!-- HERO avec diaporama -->
    <div class="home-hero-cinematic" id="hero">

      <!-- Les slides du diaporama (remplies par home.js) -->
      <div class="hero-slideshow" id="heroSlideshow"></div>

      <!-- Dégradé par dessus -->
      <div class="hero-gradient"></div>

      <!-- Points de navigation du diaporama -->
      <div class="hero-dots" id="heroDots"></div>

      <!-- Contenu texte du hero (1ère vidéo par défaut) -->
      <div class="hero-content" id="heroContent"></div>

    </div>

    <!-- GRILLE DES VLOGS -->
    <div class="home-content">
      <div class="video-sections" id="videoSections"></div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="home.js"></script>
</body>
</html>
