<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Les Vlogs de Lucas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOADING -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo">LUCAS</div>
    <div class="spinner"></div>
  </div>

  <!-- NAV -->
  <nav class="navbar" id="navbar" style="display:none">
    <div class="navbar-brand">LES VLOGS <span>DE LUCAS</span></div>
    <div class="navbar-right">
      <span class="navbar-user" id="navUserEmail"></span>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Déconnexion</button>
    </div>
  </nav>

  <!-- HOME -->
  <main class="home-page" id="homePage" style="display:none">
    <div class="home-hero">
      <div class="home-greeting">Bienvenue</div>
      <h1 class="home-title" id="heroTitle">Vos Vlogs</h1>
      <p class="home-count" id="videoCount"></p>
    </div>

    <div class="home-content">
      <h2 class="section-title">Mes vidéos</h2>
      <div class="video-grid" id="videoGrid"></div>
    </div>
  </main>

  <script type="module" src="home.js"></script>
</body>
</html>
